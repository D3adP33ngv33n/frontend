<section class="services" id="services">
    <div class="container">
      <div class="section-header text-center">
        <h2>Services</h2>
        <p class="section-subtitle">Specialized solutions for discreet protection</p>
      </div>
      
      <div class="services-grid">
        @for(service of services; track service) {
            <div class="service-card">
                <div class="service-icon">
                  {{service.icon}}
                </div>
                <h3>{{service.title}}</h3>
                <p>{{service.description}}</p>
            </div>
        }
      </div>
      
      <!-- <div class="services-note">
        <p class="mono">
          Additional services are available to vetted clients only. 
          Each engagement is tailored to specific requirements.
        </p>
      </div> -->
    </div>
  </section>
