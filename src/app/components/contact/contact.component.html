<section class="contact" id="contact">
    <div class="container">
      <div class="section-header text-center">
        <h2>Contact</h2>
      </div>
      <div class="contact-content">
        <div class="contact-form">
          <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
              <label for="purpose" class="form-label mono">Purpose of Contact</label>
              <select id="purpose" formControlName="purpose" class="form-select">
                <option value="" disabled selected>Select a purpose</option>
                <option value="service">Service Inquiry</option>
                <option value="carrier">Carrier Inquiry</option>
                <option value="other">Other</option>
              </select>
            </div>
            
            <div class="form-group">
              <label for="message" class="form-label mono">Secure Message</label>
              <textarea 
                id="message" 
                formControlName="message" 
                class="form-textarea"
                placeholder="Encrypted message will be created upon submission"
                rows="6"
              ></textarea>
            </div>
            
            <div class="form-group">
              <label class="form-checkbox">
                <input type="checkbox" formControlName="secureChannel" class="form-checkbox-input">
                <span class="form-checkbox-label mono">
                  I have access to secure communication channels
                </span>
              </label>
            </div>
            
            <button 
              type="submit" 
              class="btn btn-primary"
              [disabled]="!contactForm.valid || submitted"
            >
              {{ submitted ? 'Sending...' : 'Send Secure Request' }}
            </button>
          </form>
        </div>
      </div>
    </div>
  </section>
