<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOSTDLIB - Security Beyond Perimeters</title>
    <base href="/" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="Nostdlib.styles.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#00ffcc" />
</head>

<body>
    <div id="app">
        <div class="loading-screen">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="js/site.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => {
                    // Check for updates every 60 minutes
                    setInterval(() => reg.update(), 60 * 60 * 1000);

                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                showUpdateNotification(reg);
                            }
                        });
                    });
                });

            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) { refreshing = true; location.reload(); }
            });
        }

        function showUpdateNotification(reg) {
            const el = document.createElement('div');
            el.id = 'update-notification';
            el.innerHTML = `<div class="update-content">
                <span>A new version is available!</span>
                <button onclick="document.getElementById('update-notification').remove();
                    navigator.serviceWorker.getRegistration().then(r=>r.waiting?.postMessage({type:'SKIP_WAITING'}))">
                    Update Now</button>
                <button onclick="this.closest('#update-notification').remove()">Later</button>
            </div>`;
            document.body.appendChild(el);
        }
    </script>
</body>

</html>
